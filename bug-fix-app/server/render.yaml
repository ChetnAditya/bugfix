services:
  - type: web
    name: bugfix-server
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm ci && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: COOKIE_SECURE
        value: 'true'
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
