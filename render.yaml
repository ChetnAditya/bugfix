services:
  - type: web
    name: bugfix-api
    runtime: node
    plan: free
    buildCommand: cd bug-fix-app/server && npm install --include=dev && npx prisma generate && npm run build
    startCommand: cd bug-fix-app/server && npx prisma migrate deploy && node ./dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        value: ""
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
